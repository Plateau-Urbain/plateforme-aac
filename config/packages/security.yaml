security:
    role_hierarchy:
        ROLE_OWNER:         [ROLE_USER]
        ROLE_PROJECT_HOLDER: [ROLE_USER]
        ROLE_SONATA_ADMIN:  [ROLE_USER]
        ROLE_ADMIN:         [ROLE_USER, ROLE_SONATA_ADMIN, ROLE_PROJECT_HOLDER, ROLE_OWNER]
        ROLE_SUPER_ADMIN:   [ROLE_SONATA_ADMIN, ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]

    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        App\Entity\User:
            algorithm: auto
            migrate_from:
                - sha512

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: homepage
            logout:
                path: app_logout
                target: homepage
            switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/espace-manager/, roles: ROLE_OWNER }
        - { path: ^/appels-a-candidature/, roles: ROLE_OWNER }
        - { path: ^/espaces/, roles: PUBLIC_ACCESS }
        - { path: ^/mes-candidatures, roles: ROLE_USER }
        - { path: ^/recherche/, roles: PUBLIC_ACCESS }
        - { path: ^/admin/, roles: ROLE_ADMIN }
        - { path: ^/connect, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/connexion, roles: PUBLIC_ACCESS }
        - { path: ^/inscription, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/resetting, roles: PUBLIC_ACCESS }
        - { path: ^/mot-de-passe-oublie, roles: PUBLIC_ACCESS }
        - { path: ^/profil, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/deconnexion$, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
